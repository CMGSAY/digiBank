version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: digibank_mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_DATABASE: digibank_mvp
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - digibank-network

  mongo-db:
    image: mongo:6.0
    container_name: digibank_mongodb
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - digibank-network

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digibank_backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - mysql-db
      - mongo-db
    networks:
      - digibank-network

volumes:
  mysql_data:
  mongo_data:

networks:
  digibank-network:
    driver: bridge
